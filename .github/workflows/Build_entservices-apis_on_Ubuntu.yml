name: Build entservices-apis on Ubuntu

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

env:
  BUILD_TYPE: Debug
  THUNDER_REF: "R4.4.1"
  INTERFACES_REF: "develop"

jobs:
  ThunderComponents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install jsonref

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'

      - name: Install Dependencies
        run: >
          sudo apt-get update
          &&
          sudo apt install -y libsqlite3-dev libcurl4-openssl-dev valgrind lcov clang libsystemd-dev libboost-all-dev libwebsocketpp-dev meson libcunit1 libcunit1-dev curl protobuf-compiler-grpc libgrpc-dev libgrpc++-dev

      - name: Build trevor-base64
        run: |
            if [ ! -d "trower-base64" ]; then
            git clone https://github.com/xmidt-org/trower-base64.git
            fi
            cd trower-base64
            meson setup --warnlevel 3 --werror build
            ninja -C build
            sudo ninja -C build install

      - name: Checkout Thunder
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/Thunder
          path: Thunder
          ref: ${{env.THUNDER_REF}}

      - name: Checkout ThunderTools
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/ThunderTools
          path: ThunderTools
          ref: R4.4.3

      - name: Apply ThunderTools Patch
        run: |
          cd ThunderTools
          git apply $GITHUB_WORKSPACE/.github/Patches/00010-R4.4-Add-support-for-project-dir.patch
          cd ..

      - name: Apply Thunder Patch
        run: |
          cd Thunder
          git apply $GITHUB_WORKSPACE/.github/Patches/1004-Add-support-for-project-dir.patch
          cd ..

      - name: Build ThunderTools
        run: |
          cmake -G Ninja -S ThunderTools -B ThunderTools/build -DCMAKE_INSTALL_PREFIX="install"
          cmake --build ThunderTools/build --target install

      - name: Build Thunder
        run: |
          cmake -G Ninja -S Thunder -B Thunder/build \
            -DBINDING="127.0.0.1" \
            -DCMAKE_BUILD_TYPE="Debug" \
            -DCMAKE_INSTALL_PREFIX="install" \
            -DPORT="55555" \
            -DTOOLS_SYSROOT="${PWD}" \
            -DINITV_SCRIPT=OFF
          cmake --build Thunder/build --target install

      - name: Build entservices-apis
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_INSTALL_PREFIX="install" \
            -DTOOLS_SYSROOT="${PWD}"
          cmake --build build --target install
